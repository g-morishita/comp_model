plan_path: "study_plan.yaml"
n_reps: 4
seed: 123
n_jobs: 4

components:
  generator:
    name: "EventLogSocialPreChoiceGenerator"
    kwargs: {}
  generating_model:
    name: "Vicarious_RL"
    kwargs: {}
  fitting_model:
    name: "Vicarious_RL"
    kwargs: {}
  estimator:
    name: "BoxMLESubjectwiseEstimator"
    kwargs:
      n_starts: 5
      maxiter: 50

sampling:
  mode: "independent"
  space: "param"
  individual:
    alpha_o: {"name": "beta", "args": {"a": 2.0, "b": 2.0}}
    beta: {"name": "lognorm", "args": {"s": 0.4, "scale": 4.0}}
  by_condition: {}
  clip_to_bounds: true

output:
  out_dir: "outputs/vicarious_rl_parameter_recovery"
  save_format: "csv"
  save_config: true
  save_fit_diagnostics: true
  save_simulated_study: false
