subjects: 30
blocks_template:
  - block_id: "block_{sid}_{rep}"
    repeat: 4
    condition: "A"
    n_trials: 200
    bandit_type: "BernoulliBanditEnv"
    bandit_config: {probs: [0.2, 0.8]}
    demonstrator_type: "RLDemonstrator"
    demonstrator_config:
      model: "QRL"
      params: {alpha: 0.2, beta: 4.0}
    trial_spec_template:
      self_outcome: {kind: HIDDEN}
      demo_outcome: {kind: VERIDICAL}
      available_actions: [0, 1]
