plan_path: "study_plan.yaml"
n_reps: 1
seed: 123
n_jobs: 1

components:
  generator:
    name: "EventLogAsocialGenerator"
    kwargs: {}
  generating_model:
    name: "QRL"
    kwargs: {}
  fitting_model:
    name: "QRL"
    kwargs: {}
  estimator:
    name: "BoxMLESubjectwiseEstimator"
    kwargs:
      n_starts: 5
      maxiter: 30

sampling:
  mode: "fixed"
  space: "param"
  fixed:
    alpha: 0.20
    beta: 3.00
  by_condition: {}
  clip_to_bounds: true

output:
  out_dir: "outputs/qrl_parameter_recovery"
  save_format: "csv"
  save_config: true
  save_fit_diagnostics: true
  save_simulated_study: false
