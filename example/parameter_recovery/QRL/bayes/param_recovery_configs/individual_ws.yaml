plan_path: "study_plan_ws.yaml"
n_reps: 1
seed: 123
n_jobs: 1

components:
  generator:
    name: "EventLogAsocialGenerator"
    kwargs: {}
  generating_model:
    name: "ConditionedSharedDeltaModel"
    kwargs:
      base_model: {factory: "QRL", kwargs: {}}
      conditions: ["A", "B"]
      baseline_condition: "A"
  fitting_model:
    name: "ConditionedSharedDeltaModel"
    kwargs:
      base_model: {factory: "QRL", kwargs: {}}
      conditions: ["A", "B"]
      baseline_condition: "A"
  estimator:
    name: "StanNUTSSubjectwiseEstimator"
    kwargs:
      priors:
        alpha__shared: {family: "normal", mu: 0.0, sigma: 1.0}
        alpha__delta: {family: "normal", mu: 0.0, sigma: 1.0}
        beta__shared: {family: "normal", mu: 0.0, sigma: 1.0}
        beta__delta: {family: "normal", mu: 0.0, sigma: 1.0}
      show_progress: true

sampling:
  mode: "independent"
  space: "param"
  individual: {}
  by_condition:
    A:
      individual:
        alpha: {name: "beta", args: {a: 2.0, b: 2.0}}
        beta: {name: "lognorm", args: {s: 0.6, scale: 3.0}}
    B:
      individual:
        alpha: {name: "beta", args: {a: 2.5, b: 2.5}}
        beta: {name: "lognorm", args: {s: 0.6, scale: 4.0}}
  clip_to_bounds: true

output:
  out_dir: "outputs/qrl_parameter_recovery_individual_ws"
  save_format: "csv"
  save_config: true
  save_fit_diagnostics: true
  save_simulated_study: false

