plan_path: "../mle/study_plan.yaml"
n_reps: 1
seed: 123
n_jobs: 1

components:
  generator:
    name: "EventLogAsocialGenerator"
    kwargs: {}
  generating_model:
    name: "QRL_Stay"
    kwargs: {}
  fitting_model:
    name: "QRL_Stay"
    kwargs: {}
  estimator:
    name: "StanHierarchicalNUTSEstimator"
    kwargs:
      hyper_priors:
        mu_alpha: {family: "normal", mu: 0.0, sigma: 1.0}
        sd_alpha: {family: "half-normal", sigma: 1.0}
        mu_beta:  {family: "normal", mu: 0.0, sigma: 1.0}
        sd_beta:  {family: "half-normal", sigma: 1.0}
        mu_kappa: {family: "normal", mu: 0.0, sigma: 1.0}
        sd_kappa: {family: "half-normal", sigma: 1.0}
      show_progress: True

sampling:
  mode: "independent"
  space: "param"
  individual:
    alpha: {name: "beta", args: {a: 2.0, b: 2.0}}
    beta:  {name: "lognorm", args: {s: 1.0, scale: 2.718281828}}
    kappa: {name: "normal", args: {loc: 0.0, scale: 1.0}}
  by_condition: {}
  clip_to_bounds: true

output:
  out_dir: "outputs/qrl_stay_parameter_recovery"
  save_format: "csv"
  save_config: true
  save_fit_diagnostics: true
  save_simulated_study: false
